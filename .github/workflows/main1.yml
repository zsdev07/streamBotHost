name: Move Files to Root

on:
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Move all files (including hidden)
        run: |
          # Enable dotglob so * matches hidden files
          shopt -s dotglob
          
          # Move everything to root
          mv TGFileStreamBot-inflex/* .
          
          # Now rmdir will work because the folder is truly empty
          rmdir TGFileStreamBot-inflex
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Move all files (including hidden) to root level"
          git push
          
