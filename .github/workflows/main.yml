name: Unzip
on: 
  push:
    paths:
      - 'neurocli.zip'
  workflow_dispatch:

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract zip file
        run: |
          unzip -o neurocli.zip -d .
          # Move everything from the subfolder to the root
          mv TGFileStreamBot-inflex/* . 2>/dev/null || true
          # Remove the now-empty folder and the zip
          rm -rf TGFileStreamBot-inflex neurocli.zip

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-unzipped and moved to root" || echo "No changes to commit"
          git push
          
